<!DOCTYPE html>
<html>
<head>
  <title>My First Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Engineering Dashboard</h1>

<div class="container">

  <div class="card">
    <h3>Open Issues</h3>
    <p id="open-count">12</p>
  </div>

  <div class="card">
    <h3>Blocked</h3>
    <p id="blocked-count">3</p>
  </div>

  <div class="card">
    <h3>Completed</h3>
    <p id="done-count">8</p>
  </div>

</div>

<h2>Recent Items</h2>

<table>
  <thead>
    <tr>
      <th>Title</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="table-body">
    <tr>
      <td>Fix login bug</td>
      <td>Open</td>
    </tr>
    <tr>
      <td>Improve load time</td>
      <td>Open</td>
    </tr>
  </tbody>
</table>

  <script src="script.js"></script>
</body>
</html>
